name: mt-run-plan
description: mt-plan の計画実行ワークフロー。承認済み計画を検証し、方針に基づいて実行し、5観点の並列レビューと fix ループを経て COMPLETE する。commit/push/PR 作成は TAKT エンジンが実行後に行う。
max_steps: 50
initial_step: validate-plan

personas:
  executor: ../facets/personas/executor.md
  supervisor: ../facets/personas/supervisor.md
  reviewer-essence: ../facets/personas/reviewer-essence.md
  reviewer-completeness: ../facets/personas/reviewer-completeness.md
  reviewer-scope: ../facets/personas/reviewer-scope.md
  reviewer-policy: ../facets/personas/reviewer-policy.md
  reviewer-quality: ../facets/personas/reviewer-quality.md

policies:
  execution: ../facets/policies/execution.md
  review: ../facets/policies/review.md

knowledge:
  plan-format: ../facets/knowledge/plan-format.md

instructions:
  validate-plan: ../facets/instructions/validate-plan.md
  start-execution: ../facets/instructions/start-execution.md
  execute: ../facets/instructions/execute.md
  review-essence: ../facets/instructions/review-essence.md
  review-completeness: ../facets/instructions/review-completeness.md
  review-scope: ../facets/instructions/review-scope.md
  review-policy: ../facets/instructions/review-policy.md
  review-quality: ../facets/instructions/review-quality.md
  fix: ../facets/instructions/fix.md

report_formats:
  execution-report: ../facets/output-contracts/execution-report.md
  review-verdict: ../facets/output-contracts/review-verdict.md

loop_monitors:
  - cycle: [execute, reviewers, fix]
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        execute → reviewers → fix のサイクルが進捗しているかを判定する。
        review の指摘件数が減少傾向にあるか、fix が実質的な修正を行っているかを確認する。
        進捗している場合は "Healthy"、同じ指摘が繰り返されている場合は "Unproductive" と判定する。
      rules:
        - condition: "Healthy - review findings are converging"
          next: execute
        - condition: "Unproductive - same finding repeats or no improvement"
          next: ABORT

steps:
  - name: validate-plan
    persona: executor
    policy: execution
    edit: false
    requires_user_input: true
    instruction: validate-plan
    rules:
      - condition: "Validation passed - refined status"
        next: start-execution
      - condition: "Validation passed - in-progress status"
        next: execute
      - condition: "No executable plan"
        next: ABORT

  - name: start-execution
    persona: executor
    policy: execution
    edit: false
    instruction: start-execution
    rules:
      - condition: "Transition succeeded"
        next: execute
      - condition: "Transition failed"
        next: ABORT

  - name: execute
    persona: executor
    policy: execution
    knowledge: plan-format
    edit: true
    required_permission_mode: edit
    requires_user_input: true
    instruction: execute
    output_contracts:
      report:
        - name: execution-report.md
          format: execution-report
    rules:
      - condition: "Implementation complete"
        next: reviewers
      - condition: "Need user action - guide mode"
        next: execute
      - condition: "Cannot proceed"
        next: ABORT

  - name: reviewers
    parallel:
      - name: essence
        session_key: review-essence
        persona: reviewer-essence
        policy: review
        knowledge: plan-format
        edit: false
        instruction: review-essence
        output_contracts:
          report:
            - name: review-essence.md
              format: review-verdict
        rules:
          - condition: approved
          - condition: needs_fix

      - name: completeness
        session_key: review-completeness
        persona: reviewer-completeness
        policy: review
        knowledge: plan-format
        edit: false
        instruction: review-completeness
        output_contracts:
          report:
            - name: review-completeness.md
              format: review-verdict
        rules:
          - condition: approved
          - condition: needs_fix

      - name: scope
        session_key: review-scope
        persona: reviewer-scope
        policy: review
        knowledge: plan-format
        edit: false
        instruction: review-scope
        output_contracts:
          report:
            - name: review-scope.md
              format: review-verdict
        rules:
          - condition: approved
          - condition: needs_fix

      - name: policy
        session_key: review-policy
        persona: reviewer-policy
        policy: review
        knowledge: plan-format
        edit: false
        instruction: review-policy
        output_contracts:
          report:
            - name: review-policy.md
              format: review-verdict
        rules:
          - condition: approved
          - condition: needs_fix

      - name: quality
        session_key: review-quality
        persona: reviewer-quality
        policy: review
        knowledge: plan-format
        edit: false
        instruction: review-quality
        output_contracts:
          report:
            - name: review-quality.md
              format: review-verdict
        rules:
          - condition: approved
          - condition: needs_fix
    rules:
      - condition: all("approved")
        next: COMPLETE
      - condition: any("needs_fix")
        next: fix

  - name: fix
    persona: executor
    policy: execution
    knowledge: plan-format
    edit: true
    required_permission_mode: edit
    instruction: fix
    output_contracts:
      report:
        - name: fix-report.md
          format: execution-report
    rules:
      - condition: "Fix complete"
        next: reviewers
      - condition: "Cannot fix"
        next: ABORT

