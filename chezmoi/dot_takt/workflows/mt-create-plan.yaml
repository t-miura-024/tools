name: mt-create-plan
description: mt-plan の計画作成ワークフロー。Grill Phase で徹底的に質問し、GitHub Issue として計画を作成する。from-Issue フロー（既存 Issue の plan 化）もサポート。
max_steps: 30
initial_step: grill

personas:
  grill-partner: ../facets/personas/grill-partner.md

policies:
  grill: ../facets/policies/grill.md
  plan-creation: ../facets/policies/plan-creation.md

knowledge:
  plan-format: ../facets/knowledge/plan-format.md

instructions:
  grill: ../facets/instructions/grill.md
  create-issue: ../facets/instructions/create-issue.md
  human-gate-create: ../facets/instructions/human-gate-create.md
  promote-refined: ../facets/instructions/promote-refined.md

report_formats:
  plan: ../facets/output-contracts/plan.md

steps:
  - name: grill
    persona: grill-partner
    policy: grill
    knowledge: plan-format
    edit: false
    requires_user_input: true
    instruction: grill
    rules:
      - condition: "Grill complete - user declared sufficient"
        next: create-issue
      - condition: "Continue grilling"
        next: grill

  - name: create-issue
    persona: grill-partner
    policy: plan-creation
    knowledge: plan-format
    edit: false
    instruction: create-issue
    output_contracts:
      report:
        - name: 00-plan.md
          format: plan
    rules:
      - condition: "Issue created successfully"
        next: human-gate
      - condition: "Cannot proceed"
        next: ABORT

  - name: human-gate
    persona: grill-partner
    policy: plan-creation
    edit: false
    requires_user_input: true
    instruction: human-gate-create
    rules:
      - condition: "Promote to refined and proceed to execution"
        next: promote-refined
      - condition: "Promote to refined and end"
        next: promote-refined-end
      - condition: "Keep as draft"
        next: COMPLETE

  - name: promote-refined
    persona: grill-partner
    policy: plan-creation
    edit: false
    instruction: promote-refined
    rules:
      - condition: "Transition succeeded"
        next: run-plan
      - condition: "Transition failed"
        next: ABORT

  - name: run-plan
    workflow_call:
      workflow: mt-run-plan
    rules:
      - condition: COMPLETE
        next: COMPLETE
      - condition: ABORT
        next: ABORT

  - name: promote-refined-end
    persona: grill-partner
    policy: plan-creation
    edit: false
    instruction: promote-refined
    rules:
      - condition: "Transition succeeded"
        next: COMPLETE
      - condition: "Transition failed"
        next: ABORT
